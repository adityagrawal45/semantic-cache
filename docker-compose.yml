version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semantic-cache-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - cache-net

  redis:
    image: redis/redis-stack-server:7.4.0-v0
    container_name: semantic-cache-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cache-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: semantic-cache-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - cache-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: semantic-cache-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - cache-net

  # Optional local model runner. Only needed if you route requests to
  # models prefixed "ollama/...". Comment out if unused.
  ollama:
    image: ollama/ollama:0.3.12
    container_name: semantic-cache-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - cache-net
    profiles:
      - ollama  # only starts with: docker-compose --profile ollama up

networks:
  cache-net:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  ollama-data:
