global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "semantic-cache-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "semantic-cache"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
